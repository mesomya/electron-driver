name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions — only read access to repo contents required.
permissions:
  contents: read

env:
  # Force all JavaScript actions to run on Node 24 — Node 20 is EOL Mar 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  boot:
    name: boot check on ${{ matrix.os }} (node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # Node 20 reached EOL 2026-03-24. Test Active LTS only (22, 24).
        node: [22, 24]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        # Fail the build on high or critical severity vulnerabilities.
        run: npm audit --audit-level=high

      - name: Server boot smoke test
        shell: bash
        run: |
          # The MCP server runs over stdio. We smoke-test that it starts,
          # writes its ready banner to stderr, and exits cleanly when its
          # stdin closes.
          output=$(timeout 5 node index.mjs </dev/null 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "electron-driver MCP server v"

  security:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Scan for secrets (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          scanners: secret
          # Disable cache — secret scanning is fast and does not benefit from
          # the DB cache; disabling also avoids the internal setup-trivy step
          # pulling an actions/cache release pinned to Node 20.
          cache: 'false'

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          comment-summary-in-pr: always
          fail-on-severity: high
