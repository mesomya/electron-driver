name: release

on:
  release:
    types: [published]

# contents: read  — checkout only.
# id-token: write — required for Sigstore OIDC token used by npm provenance.
permissions:
  contents: read
  id-token: write

env:
  # Force all JavaScript actions to run on Node 24 — Node 20 is EOL Mar 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      # --provenance: generates a Sigstore attestation linking this tarball to
      # the exact GitHub Actions run, commit SHA, and source repo. Consumers can
      # verify with `npm audit signatures`. Requires id-token: write above and
      # NPM_TOKEN to be set as a repository secret.
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
